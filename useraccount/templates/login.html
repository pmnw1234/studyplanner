<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; }
        .login-box { width: 300px; margin: 100px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0px 0px 10px gray; text-align: center; }
        
        /* This styles the inputs generated by Django */
        input { width: 90%; padding: 10px; margin: 8px; box-sizing: border-box; }
        
        button { width: 95%; padding: 10px; background: rgb(4, 30, 159); color: white; border: none; border-radius: 5px; cursor: pointer; }
        a { text-decoration: none; color: rgb(0, 68, 128); }
        .error { color: red; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    {% if messages %}
        {% for message in messages %}
            <p class="error">{{ message }}</p>
        {% endfor %}
    {% endif %}

   <form method="POST">
    {% csrf_token %}
    
  
    {{ form.email }}

    {{ form.password }}
    
    <button type="submit">Login</button>
</form>

    <p>Don't have an account? 
        <a href="{% url 'register' %}">Register</a>
    </p>
</div>

</body>
</html>
